<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Branding | Magali Barradas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!--=========================
        MARQUEE
    ==========================-->

    <div class="marquee">

        <div class="marquee-track" id="marquee">

        </div>

    </div>


    <!--=========================
        MAPA
    ==========================-->

    <main class="stage">

        <div class="map branding-map" id="map">

            <!--=========================
                HERO
            ==========================-->

            <header class="greeting">

                <h1>

                    Branding <span class="accent">World</span>

                </h1>

                <p>

                    Explore meus projetos de identidade visual.

                </p>

            </header>


            <!--=========================
                BOTÕES SUPERIORES
            ==========================-->

            <div class="top-buttons">

                <button class="panel btn-icon">

                    ♪

                </button>

                <button class="panel btn-icon" id="themeBtn">

                    ☾

                </button>

                <button class="panel btn-icon">

                    PT

                </button>

            </div>


            <!--=========================
                CONTROLES
            ==========================-->

            <aside class="panel controls">

                <div class="label">

                    CONTROLOS

                </div>

                <div class="row">

                    <div class="keys">

                        <span class="key">🡅</span>

                        <span class="key">🡇</span>

                        <span class="key">🡄</span>

                        <span class="key">🡆</span>

                    </div>

                    <span>Mover</span>

                </div>

                <div class="row">

                    <div class="keys">

                        <span class="key">Enter</span>

                    </div>

                    <span>Abrir Projeto</span>

                </div>

                <div class="row">

                    <div class="keys">

                        <span class="key">Esc</span>

                    </div>

                    <span>Fechar</span>

                </div>

                <p class="hint">

                    Caminhe pelo mapa e descubra cada projeto.

                </p>

            </aside>


            <!--=========================
                PROJETOS
            ==========================-->

            <button class="coin"
                data-id="casa"
                style="left:22%;top:25%;">

                <span class="bubble">

                    Casa da Árvore

                </span>

            </button>


            <button class="coin"
                data-id="cafe"
                style="left:72%;top:28%;">

                <span class="bubble">

                    Café Torres

                </span>

            </button>


            <button class="coin"
                data-id="rotulo"
                style="left:28%;top:72%;">

                <span class="bubble">

                    Rótulo Criativo

                </span>

            </button>


            <button class="coin"
                data-id="projeto4"
                style="left:73%;top:72%;">

                <span class="bubble">

                    Projeto 4

                </span>

            </button>


            <button class="coin"
                data-id="voltar"
                style="left:48%;top:8%;">

                <span class="bubble">

                    ← Voltar ao mapa

                </span>

            </button>



            <!--=========================
                PERSONAGEM
            ==========================-->

            <div class="character"

                id="char"

                style="left:48%;top:60%;">

                <div class="bubble hint-bubble">

                    Use as setas

                </div>

                <div class="sprite"></div>

            </div>



            <!--=========================
                MINIMAPA
            ==========================-->

            <div class="panel minimap">

                <div class="mini-inner">

                    <div class="mini-dot"

                        id="miniDot">

                    </div>

                </div>

            </div>



            <!--=========================
                D-PAD
            ==========================-->

            <div class="dpad">

                <button data-dir="up">

                    🡅

                </button>

                <button data-dir="left">

                    🡄

                </button>

                <button data-dir="right">

                    🡆

                </button>

                <button data-dir="down">

                    🡇

                </button>

            </div>

        </div>

    </main>



    <!--=========================
        MODAL
    ==========================-->

    <div class="modal"

        id="modal"

        hidden>

        <div class="panel modal-card">

            <div class="modal-head">

                <h2 id="modalTitle">

                </h2>

                <button id="modalClose">

                    ESC ✕

                </button>

            </div>

            <div id="modalBody">

            </div>

        </div>

    </div>

    <script src="../Javascript/branding.js"></script>

</body>

</html>
