<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#24145f">
  <title>Branding World | Magali Barradas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/branding.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="marquee" aria-hidden="true">
    <div class="marquee-track" id="marquee"></div>
  </div>

  <main class="page-shell">
    <section class="game" aria-labelledby="pageTitle">D
      <div class="game-sky" aria-hidden="true">
        <span class="cloud cloud-one"></span>
        <span class="cloud cloud-two"></span>
        <span class="hill hill-one"></span>
        <span class="hill hill-two"></span>
      </div>

      <header class="game-header">
        <a class="pixel-button back" href="../index.html">← MAPA</a>
        <div class="title-block">
          <p class="eyebrow">SELECT A PROJECT</p>
          <h1 id="pageTitle">BRANDING <span>WORLD</span></h1>
          <p>Descobre identidades visuais num tabuleiro inspirado em minigames retrô.</p>
        </div>
        <button class="pixel-button theme-button" id="themeBtn" type="button" aria-label="Alternar tema">☾</button>
      </header>

      <div class="status-bar" aria-hidden="true">
        <span>PLAYER: MAGALI</span>
        <span class="status-center">★ PORTFOLIO QUEST ★</span>
        <span>PROJECTS: 04</span>
      </div>

      <section class="board" aria-label="Projetos de branding">
        <button class="memory-card card-pink" type="button" data-project="casa">
          <span class="card-badge">01</span>
          <span class="image-frame"><img src="../imagens/casa-da-arvore.jpg" alt="Identidade visual Casa da Árvore"></span>
          <span class="card-copy"><strong>Casa da Árvore</strong><small>Identidade visual</small></span>
          <span class="card-action">VER PROJETO</span>
        </button>

        <button class="memory-card card-yellow" type="button" data-project="cafe">
          <span class="card-badge">02</span>
          <span class="image-frame"><img src="../imagens/cafe-torres.jpg" alt="Identidade visual Café Tôrres"></span>
          <span class="card-copy"><strong>Café Tôrres</strong><small>Branding & restauração</small></span>
          <span class="card-action">VER PROJETO</span>
        </button>

        <button class="memory-card card-blue" type="button" data-project="dani">
          <span class="card-badge">03</span>
          <span class="image-frame"><img src="../imagens/dani-braga-ink.jpg" alt="Identidade visual Dani Braga Ink"></span>
          <span class="card-copy"><strong>Dani Braga Ink</strong><small>Marca pessoal</small></span>
          <span class="card-action">VER PROJETO</span>
        </button>

        <button class="memory-card card-green" type="button" data-project="lobo">
          <span class="card-badge">04</span>
          <span class="image-frame"><img src="../imagens/logo-lobo-urbano-preto.jpg" alt="Identidade visual Lobo Urbano Barber Shop"></span>
          <span class="card-copy"><strong>Lobo Urbano</strong><small>Barber shop</small></span>
          <span class="card-action">VER PROJETO</span>
        </button>
      </section>

      <p class="game-tip">CLICA NUMA CARTA PARA DESCOBRIR O PROJETO</p>
      <div class="brick-floor" aria-hidden="true"></div>
    </section>
  </main>

  <div class="modal" id="modal" hidden>
    <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-head">
        <p>PROJECT FILE</p>
        <button id="modalClose" type="button" aria-label="Fechar projeto">ESC ✕</button>
      </header>
      <div class="modal-layout">
        <img id="modalImage" src="" alt="">
        <div class="modal-copy">
          <p class="modal-number" id="modalNumber"></p>
          <h2 id="modalTitle"></h2>
          <p id="modalDescription"></p>
          <a class="pixel-button modal-link" id="modalLink" href="#" target="_blank" rel="noopener">VER PROJETO COMPLETO</a>
        </div>
      </div>
    </article>
  </div>

  <script src="../Javascript/branding.js" defer></script>
</body>
</html>
