<!doctype html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Contacto | Magali Barradas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contacto.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="contact-page">

<header class="contact-header">

<h1>🏰 CONTACTO</h1>

<p>

Chegaste ao último nível.

<br><br>

Se gostaste do meu trabalho, agora é a tua vez de dar o primeiro passo.

</p>

</header>


<section class="hero-character">

<div class="castle"></div>

<div class="player"></div>

</section>


<section class="contact-cards">

<a href="mailto:magalicsbarradas@gmail.com" class="contact-card">

<i class="fa-solid fa-envelope"></i>

<h2>Email</h2>

<p>magalicsbarradas@gmail.com</p>

</a>


<a href="https://www.linkedin.com/in/magalibarradas/" target="_blank" class="contact-card">

<i class="fa-brands fa-linkedin"></i>

<h2>LinkedIn</h2>

<p>Vamos conectar-nos.</p>

</a>


<a href="https://www.behance.net/magalibarradas1" target="_blank" class="contact-card">

<i class="fa-brands fa-behance"></i>

<h2>Behance</h2>

<p>Explora os meus projetos.</p>

</a>


<a href="https://www.instagram.com/rotulocriativo/" target="_blank" class="contact-card">

<i class="fa-brands fa-instagram"></i>

<h2>Instagram</h2>

<p>@rotulocriativo</p>

</a>

</section>


<section class="form-area">

<div class="panel form-panel">

<h2>Enviar Missão</h2>

<form id="contactForm">

<label>Nome</label>

<input
    type="text"
    name="from_name"
    placeholder="O teu nome"
    required>

<label>Email</label>

<input
    type="email"
    name="from_email"
    placeholder="email@exemplo.com"
    required>

<label>Mensagem</label>

<textarea
    name="message"
    rows="7"
    placeholder="Conta-me sobre o teu projeto..."
    required></textarea>

<button type="submit">
🚀 ENVIAR MISSÃO
</button>

</form>

</div>

</section>


<div class="back-home">

<a href="../index.html" class="panel">

⬅ Voltar ao mapa

</a>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="../Javascript/contacto.js"></script>

</body>

</html>
